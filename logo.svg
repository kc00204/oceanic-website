<svg viewBox="0 0 2600 2600" xmlns="http://www.w3.org/2000/svg">
  <!-- Ship's wheel logo -->
  <defs>
    <style>
      .wheel-outer { stroke: #d4a574; stroke-width: 120; fill: none; }
      .wheel-inner { stroke: #d4a574; stroke-width: 80; fill: none; }
      .spoke { fill: #d4a574; }
    </style>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="1300" cy="1300" r="900" class="wheel-outer"/>
  
  <!-- Inner ring -->
  <circle cx="1300" cy="1300" r="600" class="wheel-inner"/>
  
  <!-- Spokes (8 handles) -->
  <g class="spoke">
    <!-- Top -->
    <ellipse cx="1300" cy="250" rx="90" ry="140"/>
    <!-- Top-right -->
    <ellipse cx="1730" cy="470" rx="90" ry="140" transform="rotate(45 1730 470)"/>
    <!-- Right -->
    <ellipse cx="2350" cy="1300" rx="140" ry="90"/>
    <!-- Bottom-right -->
    <ellipse cx="1730" cy="2130" rx="90" ry="140" transform="rotate(45 1730 2130)"/>
    <!-- Bottom -->
    <ellipse cx="1300" cy="2350" rx="90" ry="140"/>
    <!-- Bottom-left -->
    <ellipse cx="870" cy="2130" rx="90" ry="140" transform="rotate(-45 870 2130)"/>
    <!-- Left -->
    <ellipse cx="250" cy="1300" rx="140" ry="90"/>
    <!-- Top-left -->
    <ellipse cx="870" cy="470" rx="90" ry="140" transform="rotate(-45 870 470)"/>
  </g>
</svg>
